<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORDLY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div id="main-menu-container">
            <h1>WORDLY</h1>
            <div id="buttons-main-menu">
                <button id="start-game-button">Начать игру</button>
                <button id="leader-board-button">Таблица лидеров</button>
            </div>
            <div></div>
        </div>

        <div id="leader-board-container">
            <h1>Таблица лидеров</h1>
            <table id="leader-board-table">
                <th>
                    <tr class="row-leader-board-table">
                        <td class="table-cells">Имя</td>
                        <td class="table-cells">Попытка</td>
                        <td class="table-cells">Время</td>
                    </tr>
                </th>
                <tbody id="table-body-leaderboard">
                    <tr class="row-leader-board-table">
                        <td class="table-cells">4aek</td>
                        <td class="table-cells">5</td>
                        <td class="table-cells">13 сек.</td>
                    </tr>
                    <tr class="row-leader-board-table">
                        <td class="table-cells">Kret1n</td>
                        <td class="table-cells">2</td>
                        <td class="table-cells">9 сек.</td>
                    </tr>
                    <tr class="row-leader-board-table">
                        <td class="table-cells">Имя</td>
                        <td class="table-cells">Попытка</td>
                        <td class="table-cells">Время</td>
                    </tr>
                    <tr class="row-leader-board-table">
                        <td class="table-cells">Имя</td>
                        <td class="table-cells">Попытка</td>
                        <td class="table-cells">Время</td>
                    </tr>
                </tbody>
            </table>
            <button id="back-to-main-menu">Назад</button>
        </div>

        <div id="game-container">
            <h1>WORDLY</h1>
            <table id="game-field">
                <tbody>
                    <tr>
                        <td data-y="0" data-x="0"></td>
                        <td data-y="0" data-x="1"></td>
                        <td data-y="0" data-x="2"></td>
                        <td data-y="0" data-x="3"></td>
                        <td data-y="0" data-x="4"></td>
                    </tr>
                    <tr>
                        <td data-y="1" data-x="0"></td>
                        <td data-y="1" data-x="1"></td>
                        <td data-y="1" data-x="2"></td>
                        <td data-y="1" data-x="3"></td>
                        <td data-y="1" data-x="4"></td>
                    </tr>
                    <tr>
                        <td data-y="2" data-x="0"></td>
                        <td data-y="2" data-x="1"></td>
                        <td data-y="2" data-x="2"></td>
                        <td data-y="2" data-x="3"></td>
                        <td data-y="2" data-x="4"></td>
                    </tr>
                    <tr>
                        <td data-y="3" data-x="0"></td>
                        <td data-y="3" data-x="1"></td>
                        <td data-y="3" data-x="2"></td>
                        <td data-y="3" data-x="3"></td>
                        <td data-y="3" data-x="4"></td>
                    </tr>
                    <tr>
                        <td data-y="4" data-x="0"></td>
                        <td data-y="4" data-x="1"></td>
                        <td data-y="4" data-x="2"></td>
                        <td data-y="4" data-x="3"></td>
                        <td data-y="4" data-x="4"></td>
                    </tr>
                </tbody>
            </table>
            <div id="keyboard">
                <button data-value=""> А </button>
                <button data-value=""> Б </button>
                <button data-value=""> В </button>
                <button data-value=""> Г </button>
                <button data-value=""> Д </button>
                <button data-value=""> Е </button>
                <button data-value=""> Ё</button>
                <button data-value=""> Ж </button>
                <button data-value=""> З </button>
                <button data-value=""> И </button>
                <button data-value=""> Й </button>
                <button data-value=""> К </button>
                <button data-value=""> Л </button>
                <button data-value=""> М </button>
                <button data-value=""> Н </button>
                <button data-value=""> О </button>
                <button data-value=""> П </button>
                <button data-value=""> Р </button>
                <button data-value=""> С </button>
                <button data-value=""> Т </button>
                <button data-value=""> У </button>
                <button data-value=""> Ф </button>
                <button data-value=""> Х </button>
                <button data-value=""> Ц </button>
                <button id="delete-button" data-value=""><img src="images/delete-svgrepo-com.svg"></button>
                <button data-value=""> Ч </button>
                <button data-value=""> Ш </button>
                <button data-value=""> Щ </button>
                <button data-value=""> Ъ </button>
                <button data-value=""> Ы </button>
                <button data-value=""> ь </button>
                <button data-value=""> Э </button>
                <button data-value=""> Ю </button>
                <button data-value=""> Я </button>
                <button id="enter-button" data-value=""> ВВОД </button>
            </div>
        </div>

        <div id="end-game-contaner">

        </div>
    </main>
</body>
<script type="module" src="main.mjs"></script>
</html>
