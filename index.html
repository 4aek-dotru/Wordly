<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORDLE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div id="main-menu-container">
            <h1>WORDLE</h1>
            <div id="buttons-main-menu">
                <button id="start-game-button">Начать игру</button>
                <button id="leader-board-button">Таблица лидеров</button>
            </div>
            <div></div>
        </div>

        <div id="leader-board-container">
            <h1>Таблица лидеров</h1>
            <table id="leader-board-table">
                <th>
                    <tr class="row-leader-board-table">
                        <td class="table-cells">Имя</td>
                        <td class="table-cells">Попытка</td>
                        <td class="table-cells">Время</td>
                    </tr>
                </th>
                <tbody id="table-body-leaderboard">
                    <tr class="row-leader-board-table">
                        <td class="table-cells">4aek</td>
                        <td class="table-cells">5</td>
                        <td class="table-cells">13 сек.</td>
                    </tr>
                    <tr class="row-leader-board-table">
                        <td class="table-cells">Kret1n</td>
                        <td class="table-cells">2</td>
                        <td class="table-cells">9 сек.</td>
                    </tr>
                    <tr class="row-leader-board-table">
                        <td class="table-cells">Имя</td>
                        <td class="table-cells">Попытка</td>
                        <td class="table-cells">Время</td>
                    </tr>
                    <tr class="row-leader-board-table">
                        <td class="table-cells">Имя</td>
                        <td class="table-cells">Попытка</td>
                        <td class="table-cells">Время</td>
                    </tr>
                </tbody>
            </table>
            <button id="back-to-main-menu">Назад</button>
        </div>

        <div id="game-container">
            <h1>WORDLE</h1>
            <table id="game-field">
                <tbody>
                    <tr data-y="0">
                        <td data-y="0" data-x="0"></td>
                        <td data-y="0" data-x="1"></td>
                        <td data-y="0" data-x="2"></td>
                        <td data-y="0" data-x="3"></td>
                        <td data-y="0" data-x="4"></td>
                    </tr>
                    <tr data-y="1">
                        <td data-y="1" data-x="0"></td>
                        <td data-y="1" data-x="1"></td>
                        <td data-y="1" data-x="2"></td>
                        <td data-y="1" data-x="3"></td>
                        <td data-y="1" data-x="4"></td>
                    </tr>
                    <tr data-y="2">
                        <td data-y="2" data-x="0"></td>
                        <td data-y="2" data-x="1"></td>
                        <td data-y="2" data-x="2"></td>
                        <td data-y="2" data-x="3"></td>
                        <td data-y="2" data-x="4"></td>
                    </tr>
                    <tr data-y="3">
                        <td data-y="3" data-x="0"></td>
                        <td data-y="3" data-x="1"></td>
                        <td data-y="3" data-x="2"></td>
                        <td data-y="3" data-x="3"></td>
                        <td data-y="3" data-x="4"></td>
                    </tr>
                    <tr data-y="4">
                        <td data-y="4" data-x="0"></td>
                        <td data-y="4" data-x="1"></td>
                        <td data-y="4" data-x="2"></td>
                        <td data-y="4" data-x="3"></td>
                        <td data-y="4" data-x="4"></td>
                    </tr>
                </tbody>
            </table>
            <div id="keyboard">
                <div id="first-row">
                    <button data-value="Backquote">Ё</button>
                    <button id="delete-button" data-value="Backspace"><img src="images/delete-svgrepo-com.svg"></button>
                </div>
                <div id="second-row">
                    <button data-value="KeyQ">Й</button>
                    <button data-value="KeyW">Ц</button>
                    <button data-value="KeyE">У</button>
                    <button data-value="KeyR">К</button>
                    <button data-value="KeyT">Е</button>
                    <button data-value="KeyY">Н</button>
                    <button data-value="KeyU">Г</button>
                    <button data-value="KeyI">Ш</button>
                    <button data-value="KeyO">Щ</button>
                    <button data-value="KeyP">З</button>
                    <button data-value="BracketLeft">Х</button>
                    <button data-value="BracketRight">Ъ</button>
                </div>
                <div id="third-row">
                    <button data-value="KeyA">Ф</button>
                    <button data-value="KeyS">Ы</button>
                    <button data-value="KeyD">В</button>
                    <button data-value="KeyF">А</button>
                    <button data-value="KeyG">П</button>
                    <button data-value="KeyH">Р</button>
                    <button data-value="KeyJ">О</button>
                    <button data-value="KeyK">Л</button>
                    <button data-value="KeyL">Д</button>
                    <button data-value="Semicolon">Ж</button>
                    <button data-value="Quote">Э</button>
                </div>
                <div id="quadro-row">
                    <button data-value="KeyZ">Я</button>
                    <button data-value="KeyX">Ч</button>
                    <button data-value="KeyC">С</button>
                    <button data-value="KeyV">М</button>
                    <button data-value="KeyB">И</button>
                    <button data-value="KeyN">Т</button>
                    <button data-value="KeyM">Ь</button>
                    <button data-value="KeyM">Б</button>
                    <button data-value="Period">Ю</button>
                </div>
            </div>
        </div>

        <div id="end-game-contaner">

        </div>
    </main>
</body>
<script type="module" src="main.mjs"></script>
</html>
